apiVersion: apps/v1
kind: Deployment
metadata:
  name: score-service
  namespace: motus
spec:
  replicas: 1
  selector:
    matchLabels:
      app: score-service
  template:
    metadata:
      labels:
        app: score-service
    spec:
      initContainers:
        - name: wait-for-db
          image: busybox:1.36
          command: ["sh", "-c", "until nc -z score-db 5432; do echo waiting for score-db; sleep 2; done"]
        - name: wait-for-player-service
          image: busybox:1.36
          command: ["sh", "-c", "until nc -z player-service 8082; do echo waiting for player-service; sleep 2; done"]
      containers:
        - name: score-service
          image: motus-score-service:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 8083
          env:
            - name: SERVER_PORT
              value: "8083"
            - name: SPRING_DATASOURCE_URL
              value: jdbc:postgresql://score-db:5432/motus_score
            - name: SPRING_DATASOURCE_USERNAME
              valueFrom:
                secretKeyRef:
                  name: motus-db-secret
                  key: POSTGRES_USER
            - name: SPRING_DATASOURCE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: motus-db-secret
                  key: POSTGRES_PASSWORD
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8083
            initialDelaySeconds: 25
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 8083
            initialDelaySeconds: 40
            periodSeconds: 15
---
apiVersion: v1
kind: Service
metadata:
  name: score-service
  namespace: motus
spec:
  selector:
    app: score-service
  ports:
    - port: 8083
      targetPort: 8083
