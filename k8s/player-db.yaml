apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: player-db-pvc
  namespace: motus
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: player-db
  namespace: motus
spec:
  replicas: 1
  selector:
    matchLabels:
      app: player-db
  template:
    metadata:
      labels:
        app: player-db
    spec:
      containers:
        - name: postgres
          image: postgres:16-alpine
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRES_DB
              value: motus_player
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: motus-db-secret
                  key: POSTGRES_USER
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: motus-db-secret
                  key: POSTGRES_PASSWORD
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "motus", "-d", "motus_player"]
            initialDelaySeconds: 5
            periodSeconds: 5
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: player-db-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: player-db
  namespace: motus
spec:
  selector:
    app: player-db
  ports:
    - port: 5432
      targetPort: 5432
