apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: motus
spec:
  replicas: 1
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      initContainers:
        - name: wait-for-services
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              until nc -z player-service 8082 && nc -z game-service 8081 && nc -z score-service 8083; do
                echo waiting for backend services
                sleep 3
              done
      containers:
        - name: frontend
          image: motus-frontend:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: frontend
  namespace: motus
spec:
  type: NodePort
  selector:
    app: frontend
  ports:
    - port: 80
      targetPort: 80
      nodePort: 30080
