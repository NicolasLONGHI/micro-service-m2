apiVersion: apps/v1
kind: Deployment
metadata:
  name: game-service
  namespace: motus
spec:
  replicas: 1
  selector:
    matchLabels:
      app: game-service
  template:
    metadata:
      labels:
        app: game-service
    spec:
      initContainers:
        - name: wait-for-db
          image: busybox:1.36
          command: ["sh", "-c", "until nc -z game-db 5432; do echo waiting for game-db; sleep 2; done"]
        - name: wait-for-player-service
          image: busybox:1.36
          command: ["sh", "-c", "until nc -z player-service 8082; do echo waiting for player-service; sleep 2; done"]
      containers:
        - name: game-service
          image: motus-game-service:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 8081
          env:
            - name: SERVER_PORT
              value: "8081"
            - name: SPRING_DATASOURCE_URL
              value: jdbc:postgresql://game-db:5432/motus_game
            - name: SPRING_DATASOURCE_USERNAME
              valueFrom:
                secretKeyRef:
                  name: motus-db-secret
                  key: POSTGRES_USER
            - name: SPRING_DATASOURCE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: motus-db-secret
                  key: POSTGRES_PASSWORD
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8081
            initialDelaySeconds: 35
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 8081
            initialDelaySeconds: 50
            periodSeconds: 15
---
apiVersion: v1
kind: Service
metadata:
  name: game-service
  namespace: motus
spec:
  selector:
    app: game-service
  ports:
    - port: 8081
      targetPort: 8081
